# Nginx reverse proxy configuration for AWS EC2 deployment
# Routes traffic to users (8080), orders (8081), shipments (8082)
# Serves landing page at /
events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location = / {
    default_type text/html;
    return 200 '<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Order Processing API</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 650px; margin: 80px auto; padding: 0 20px; color: #333; }
        h1 { color: #333; }
        h2 { color: #444; margin-top: 40px; font-size: 1.1em; text-transform: uppercase; letter-spacing: 0.05em; }
        p { color: #666; }
        ul, ol { color: #555; line-height: 1.8; }
        li { margin: 8px 0; }
        a { display: inline-block; padding: 10px 20px; background: #4CAF50; color: white;
            text-decoration: none; border-radius: 4px; font-size: 16px; }
        a:hover { background: #45a049; }
        .services { list-style: none; padding: 0; }
        .services li { margin: 15px 0; }
        .credentials { background: #f5f5f5; border-radius: 6px; padding: 16px 20px; margin: 16px 0; }
        .credentials table { border-collapse: collapse; width: 100%; }
        .credentials td, .credentials th { padding: 6px 16px; text-align: left; }
        .credentials th { color: #888; font-size: 0.85em; text-transform: uppercase; }
        .credentials tr + tr td { border-top: 1px solid #e0e0e0; }
        code { background: #eee; padding: 2px 6px; border-radius: 3px; font-size: 0.95em; }
        .note { font-size: 0.85em; color: #888; margin-top: 40px; border-top: 1px solid #eee; padding-top: 16px; }
    </style>
</head>
<body>
    <h1>Order Processing API</h1>
    <p>A microservices portfolio project — authentication, orders, and fulfillment over RabbitMQ.</p>

    <h2>Services</h2>
    <ul class="services">
        <li><a href="/users/swagger-ui/index.html" target="_blank">Users API</a></li>
        <li><a href="/orders/swagger-ui/index.html" target="_blank">Orders API</a></li>
        <li><a href="/shipments/swagger-ui/index.html" target="_blank">Shipments API</a></li>
    </ul>

    <h2>Getting Started</h2>
    <ol>
        <li>Open <strong>Users API</strong> and POST to <code>/login/auth</code> using one of these credentials:</li>
    </ol>
    <div class="credentials">
        <table>
            <tr><th>Username</th><th>Password</th><th>Role</th></tr>
            <tr><td>ADMIN</td><td>ADMIN</td><td>Full access</td></tr>
            <tr><td>guest</td><td>guest</td><td>Read-only</td></tr>
        </table>
    </div>
    <ol start="2">
        <li>Copy the JWT token from the response</li>
        <li>Open any service, click <strong>Authorize</strong>, paste the token</li>
        <li>Explore the APIs — create products, place orders, confirm and ship them</li>
    </ol>

    <p class="note">&#9888; Running on AWS free tier &mdash; first request may be slow due to JVM warmup.</p>
</body>
</html>';
}

        location /users/ {
            proxy_pass http://users:8080/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /orders/ {
            proxy_pass http://orders:8081/orders/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /shipments/ {
            proxy_pass http://shipments:8082/shipments/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
